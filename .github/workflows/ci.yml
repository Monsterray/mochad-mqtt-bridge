name: CI

on:
  push:
    branches:
      - master
      - develop
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python files
        run: python -m compileall .

      - name: Run unit tests
        run: python -m unittest discover -s tests

  docker:
    name: Compose and Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate Docker Compose
        run: docker compose config

      - name: Prepare Docker metadata
        id: docker-meta
        run: |
          . release/versions.env
          {
            echo "created=$(git show -s --format=%cI HEAD)"
            echo "revision=${GITHUB_SHA}"
            echo "version=${IMAGE_VERSION}"
            echo "source=https://github.com/${GITHUB_REPOSITORY}"
            echo "python_base_image=${PYTHON_BASE_IMAGE}"
          } >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build --pull \
            --build-arg PYTHON_BASE_IMAGE="${{ steps.docker-meta.outputs.python_base_image }}" \
            --build-arg IMAGE_CREATED="${{ steps.docker-meta.outputs.created }}" \
            --build-arg IMAGE_REVISION="${{ steps.docker-meta.outputs.revision }}" \
            --build-arg IMAGE_VERSION="${{ steps.docker-meta.outputs.version }}" \
            --build-arg IMAGE_SOURCE="${{ steps.docker-meta.outputs.source }}" \
            --tag x10-mochad-mqtt-bridge:ci .

      - name: Validate Docker image labels
        run: python scripts/validate/image_labels.py --image x10-mochad-mqtt-bridge:ci

      - name: Record runtime APK package evidence
        run: |
          docker run --rm \
            --entrypoint cat \
            x10-mochad-mqtt-bridge:ci \
            /usr/share/mochad-mqtt-bridge/apk-info.txt \
            > apk-info.txt

      - name: Upload runtime APK package evidence
        uses: actions/upload-artifact@v4
        with:
          name: bridge-runtime-apk-info
          path: apk-info.txt

  mqtt-tls-integration:
    name: Mosquitto MQTT TLS integration
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes mosquitto openssl

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Mosquitto TLS integration tests
        env:
          RUN_MQTT_TLS_INTEGRATION: "1"
        run: python -m unittest tests.integration.test_mqtt_tls_mosquitto
