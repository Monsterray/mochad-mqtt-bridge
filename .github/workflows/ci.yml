name: CI

on:
  push:
    branches:
      - master
      - develop
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python files
        run: python -m compileall .

      - name: Run unit tests
        run: python -m unittest discover -s tests

  docker:
    name: Compose and Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate Docker Compose
        run: docker compose config

      - name: Build Docker image
        run: docker build --pull --tag x10-mochad-mqtt-bridge:ci .

      - name: Validate container permissions
        env:
          IMAGE: x10-mochad-mqtt-bridge:ci
        run: scripts/validate/container_permissions.sh

  mqtt-tls-integration:
    name: Mosquitto MQTT TLS integration
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes mosquitto openssl

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Mosquitto TLS integration tests
        env:
          RUN_MQTT_TLS_INTEGRATION: "1"
        run: python -m unittest tests.integration.test_mqtt_tls_mosquitto
