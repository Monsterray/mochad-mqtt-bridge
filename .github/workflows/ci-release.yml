name: CI Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build:
    name: Build and publish release image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Prepare Docker metadata
        id: docker-meta
        run: |
          . release/versions.env
          source_version="$(python3 -c 'from version import BRIDGE_VERSION; print(BRIDGE_VERSION)')"
          if [ "$source_version" != "$IMAGE_VERSION" ]; then
            echo "version.py ($source_version) does not match release/versions.env ($IMAGE_VERSION)" >&2
            exit 1
          fi
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ] && [ "${GITHUB_REF_NAME#v}" != "$IMAGE_VERSION" ]; then
            echo "tag ${GITHUB_REF_NAME} does not match release version ${IMAGE_VERSION}" >&2
            exit 1
          fi
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ] && ! git merge-base --is-ancestor "$GITHUB_SHA" origin/master; then
            echo "release tag ${GITHUB_REF_NAME} is not on the master branch" >&2
            exit 1
          fi
          {
            echo "created=$(git show -s --format=%cI HEAD)"
            echo "revision=${GITHUB_SHA}"
            echo "version=${IMAGE_VERSION}"
            echo "source=https://github.com/${GITHUB_REPOSITORY}"
            echo "python_base_image=${PYTHON_BASE_IMAGE}"
            echo "image_name=${IMAGE_NAME}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.ref_type == 'tag'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build release image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.ref_type == 'tag' }}
          sbom: true
          provenance: mode=max
          tags: |
            ${{ steps.docker-meta.outputs.image_name }}:${{ steps.docker-meta.outputs.version }}
          build-args: |
            PYTHON_BASE_IMAGE=${{ steps.docker-meta.outputs.python_base_image }}
            IMAGE_CREATED=${{ steps.docker-meta.outputs.created }}
            IMAGE_REVISION=${{ steps.docker-meta.outputs.revision }}
            IMAGE_VERSION=${{ steps.docker-meta.outputs.version }}
            IMAGE_SOURCE=${{ steps.docker-meta.outputs.source }}

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          heading="$(awk -v prefix="## [$version] - " '
            index($0, prefix) == 1 {
              date = substr($0, length(prefix) + 1)
              if (date ~ /^[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]$/) {
                print
                exit
              }
            }
          ' CHANGELOG.md)"
          if [ -z "$heading" ]; then
            echo "CHANGELOG.md must date the $version release as YYYY-MM-DD before tagging" >&2
            exit 1
          fi
          awk -v heading="$heading" '
            $0 == heading { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "CHANGELOG.md has no release notes for $version" >&2
            exit 1
          fi
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "GitHub Release $GITHUB_REF_NAME already exists"
          else
            if ! gh release create "$GITHUB_REF_NAME" \
                --verify-tag \
                --title "$GITHUB_REF_NAME" \
                --notes-file /tmp/release-notes.md 2>/tmp/release-create.err; then
              # A concurrent release job may have created this tag after the
              # initial lookup. Confirm that case instead of failing on 422.
              if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
                echo "GitHub Release $GITHUB_REF_NAME was created concurrently"
              else
                cat /tmp/release-create.err >&2
                exit 1
              fi
            fi
          fi
