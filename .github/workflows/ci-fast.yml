name: CI Fast

on:
  push:
    branches: [master, develop, "fix/**"]
  pull_request:
    branches: [master, develop]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Compile Python
        run: python -m compileall .
      - name: Validate version contract
        run: scripts/validate/version-consistency.sh
      - name: Run deterministic unit coverage
        run: python -m pytest -m "not integration and not lifecycle and not tls and not container"
