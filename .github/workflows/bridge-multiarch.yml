name: Bridge Multiarch CI

on:
  push:
    branches: [master, develop, "fix/**"]
  pull_request:
    branches: [master, develop]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - id: version
        run: echo "value=$(cat VERSION)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Build amd64 and arm64 OCI index without publishing
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          platforms: linux/amd64,linux/arm64
          outputs: type=oci,dest=/tmp/mochad-mqtt-bridge-multiarch.tar
          build-args: |
            IMAGE_VERSION=${{ steps.version.outputs.value }}
