name: Bridge Container CI

on:
  push:
    branches: [master, develop, "fix/**"]
  pull_request:
    branches: [master, develop]

permissions:
  contents: read

jobs:
  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: docker/setup-buildx-action@v3
      - name: Prepare image metadata
        id: metadata
        run: |
          . release/versions.env
          {
            echo "created=$(git show -s --format=%cI HEAD)"
            echo "revision=${GITHUB_SHA}"
            echo "version=${IMAGE_VERSION}"
            echo "source=https://github.com/${GITHUB_REPOSITORY}"
            echo "python_base_image=${PYTHON_BASE_IMAGE}"
          } >> "$GITHUB_OUTPUT"
      - name: Build local test image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: x10-mochad-mqtt-bridge:ci
          build-args: |
            PYTHON_BASE_IMAGE=${{ steps.metadata.outputs.python_base_image }}
            IMAGE_CREATED=${{ steps.metadata.outputs.created }}
            IMAGE_REVISION=${{ steps.metadata.outputs.revision }}
            IMAGE_VERSION=${{ steps.metadata.outputs.version }}
            IMAGE_SOURCE=${{ steps.metadata.outputs.source }}
      - name: Validate Compose files
        run: |
          docker compose config
          mkdir -p secrets
          touch secrets/mqtt_password.txt secrets/mqtt_ca.crt secrets/mqtt_client.crt secrets/mqtt_client.key secrets/mqtt_client_key_password.txt
          docker compose -f docker-compose.yml -f docker-compose.secrets.yml config
      - name: Validate labels and runtime permissions
        run: |
          python -m pip install -r requirements.txt
          python scripts/validate/image_labels.py --image x10-mochad-mqtt-bridge:ci
          IMAGE=x10-mochad-mqtt-bridge:ci IMAGE_BUILT=true scripts/validate/container_permissions.sh
