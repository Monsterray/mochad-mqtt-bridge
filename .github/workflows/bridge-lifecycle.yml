name: Bridge Lifecycle CI

on:
  push:
    branches: [master, develop, "fix/**"]
  pull_request:
    branches: [master, develop]

permissions:
  contents: read

jobs:
  lifecycle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes mosquitto
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Verify degraded startup, recovery, and bounded shutdown
        run: python -m pytest tests/test_lifecycle.py -m lifecycle
